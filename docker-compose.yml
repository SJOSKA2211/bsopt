version: '3.9'

x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"

x-security: &security
  security_opt:
    - no-new-privileges:true

services:
  # ============================================================================
  # OBSERVABILITY STACK (Loki / Prometheus / Grafana / Promtail)
  # ============================================================================
  
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: bsopt-prometheus
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    networks:
      - monitor-net
    restart: always
    <<: *security

  loki:
    image: grafana/loki:2.9.2
    container_name: bsopt-loki
    volumes:
      - ./monitoring/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    networks:
      - monitor-net
    restart: always
    <<: *security

  promtail:
    image: grafana/promtail:2.9.2
    container_name: bsopt-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail:/etc/promtail
    command: -config.file=/etc/promtail/promtail-config.yaml
    networks:
      - monitor-net
    restart: always
    <<: *security

  grafana:
    image: grafana/grafana:10.2.0
    container_name: bsopt-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_LIVE_ALLOWED_ORIGINS=*
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - monitor-net
    restart: always
    <<: *security

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: bsopt-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - monitor-net
    restart: unless-stopped
    <<: *security

  pushgateway:
    image: prom/pushgateway:v1.6.0
    container_name: bsopt-pushgateway
    ports:
      - "9091:9091"
    networks:
      - monitor-net
    restart: always
    <<: *security

  # ============================================================================
  # CORE INFRASTRUCTURE
  # ============================================================================

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: bsopt-postgres
    shm_size: 1g
    environment:
      POSTGRES_DB: bsopt
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bsopt"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    ports:
      - "5432:5432"
    networks:
      - bsopt-net
      - monitor-net
    restart: always
    <<: *security

  redis:
    image: redis:7-alpine
    container_name: bsopt-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
    networks:
      - bsopt-net
      - monitor-net
    restart: always
    <<: *security

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0-alpine
    container_name: bsopt-redis-exporter
    environment:
      - REDIS_ADDR=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - redis
    networks:
      - monitor-net
    restart: always
    <<: *security

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: bsopt-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bsopt-net
      - monitor-net
    restart: always
    <<: *security

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: bsopt-mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://admin:${DB_PASSWORD}@postgres:5432/mlflow
      - MLFLOW_ARTIFACT_ROOT=/mlartifacts
    volumes:
      - model_artifacts:/mlartifacts
    command: mlflow server --backend-store-uri postgresql://admin:${DB_PASSWORD}@postgres:5432/mlflow --default-artifact-root /mlartifacts --host 0.0.0.0 --port 5000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    networks:
      - bsopt-net
      - monitor-net
    restart: always
    <<: *security

  # ============================================================================
  # APPLICATION LAYER
  # ============================================================================

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: bsopt-api
    logging: *logging
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@postgres:5432/bsopt
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RABBITMQ_URL: amqp://admin:${RABBITMQ_PASSWORD}@rabbitmq:5672/bsopt
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PROMETHEUS_MULTIPROC_DIR: /tmp/metrics
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bsopt-net
      - monitor-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    restart: always
    <<: *security

  ml-pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile.ml
    container_name: bsopt-ml-pipeline
    logging: *logging
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@127.0.0.1:5432/bsopt
      MLFLOW_TRACKING_URI: http://127.0.0.1:5000
      PUSHGATEWAY_URL: 127.0.0.1:9091
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-DEMO_KEY}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-DEMO_KEY}
      MPLCONFIGDIR: /tmp/matplotlib
      PYTHONPATH: /app
    volumes:
      - model_artifacts:/app/models
      - ./src:/app/src
      - model_artifacts:/mlartifacts
    user: root
    network_mode: host
    restart: on-failure
    depends_on:
      - mlflow

  # ============================================================================
  # STREAMING INFRASTRUCTURE (Kafka Cluster)
  # ============================================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bsopt-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - kafka-net
    restart: always
    <<: *security

  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bsopt-kafka-1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_NUM_PARTITIONS: 8
    volumes:
      - kafka1_data:/var/lib/kafka/data
    networks:
      - kafka-net
      - monitor-net
    restart: always
    <<: *security

  kafka-2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bsopt-kafka-2
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    volumes:
      - kafka2_data:/var/lib/kafka/data
    networks:
      - kafka-net
      - monitor-net
    restart: always
    <<: *security

  kafka-3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bsopt-kafka-3
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    volumes:
      - kafka3_data:/var/lib/kafka/data
    networks:
      - kafka-net
      - monitor-net
    restart: always
    <<: *security

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: bsopt-schema-registry
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    networks:
      - kafka-net
      - monitor-net
    restart: always
    <<: *security

  ksqldb-server:
    image: confluentinc/ksqldb-server:0.29.0
    container_name: bsopt-ksqldb
    depends_on:
      - kafka-1
      - schema-registry
    environment:
      KSQL_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KSQL_KSQL_LOGGING_PROCESSING_STREAM_AUTO_CREATE: "true"
      KSQL_KSQL_LOGGING_PROCESSING_TOPIC_AUTO_CREATE: "true"
    ports:
      - "8088:8088"
    networks:
      - kafka-net
      - monitor-net
    restart: always
    <<: *security

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bsopt-kafka-ui
    depends_on:
      - kafka-1
    environment:
      KAFKA_CLUSTERS_0_NAME: bsopt-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KSQLDBSERVER: http://ksqldb-server:8088
    ports:
      - "8080:8080"
    networks:
      - kafka-net
      - monitor-net
    restart: always
    <<: *security

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: bsopt-kafka-exporter
    command:
      - --kafka.server=kafka-1:9092
      - --kafka.server=kafka-2:9092
      - --kafka.server=kafka-3:9092
    ports:
      - "9308:9308"
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - kafka-net
      - monitor-net
    restart: always
    <<: *security

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  model_artifacts:
  prometheus_data:
  grafana_data:
  loki_data:
  zookeeper_data:
  kafka1_data:
  kafka2_data:
  kafka3_data:

networks:
  bsopt-net:
    driver: bridge
  monitor-net:
    driver: bridge
  kafka-net:
    driver: bridge