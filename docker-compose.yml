services:
  # PostgreSQL with TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: bsopt-postgres
    environment:
      POSTGRES_DB: bsopt
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bsopt"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bsopt-network

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: bsopt-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - bsopt-network

  # RabbitMQ for message queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bsopt-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: bsopt
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bsopt-network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: bsopt-api
    init: true
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@postgres:5432/bsopt
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RABBITMQ_URL: amqp://admin:${RABBITMQ_PASSWORD}@rabbitmq:5672/bsopt
      JWT_ALGORITHM: RS256
      JWT_PRIVATE_KEY_PATH: /app/certs/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/jwt-public.pem
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      PYTHONOPTIMIZE: 1
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    volumes:
      - ./src:/app/src
      - ./certs:/app/certs
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop --http h11 --proxy-headers --forwarded-allow-ips="*"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - bsopt-network
    restart: always

  # Celery Workers
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: bsopt-worker
    init: true
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@postgres:5432/bsopt
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RABBITMQ_URL: amqp://admin:${RABBITMQ_PASSWORD}@rabbitmq:5672/bsopt
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - postgres
      - redis
      - rabbitmq
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - bsopt-network
    restart: always

  # MLflow
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: bsopt-mlflow
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://admin:${DB_PASSWORD}@postgres:5432/bsopt
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    command: mlflow server --backend-store-uri postgresql://admin:${DB_PASSWORD}@postgres:5432/bsopt --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --port 5000
    depends_on:
      postgres: { condition: service_healthy }
    networks:
      - bsopt-network

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: bsopt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - bsopt-network
    restart: always

networks:
  bsopt-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
