[alembic]
# path to migration scripts
script_location = alembic

# version file location
version_locations = %(script_location)s/versions

# file indicating revision id and revision number
rev_id = %(revid)s

# revision file template
revision_environment_implementation = %(script_location)s/env.py

# set to true to enable timestamp based revision ids
# timestamp = false

# set to true to enable autogenerated revision ids
# autogenerate = false

# enable unicode support
use_multiprocessing = true
strip_whitespace = true

[alembic:versions]
# path to version file directory
version_locations = %(script_location)s/versions

[sqlalchemy]
# database connection string
# Uses the newly generated secrets from .env
# DATABASE_URL=postgresql://admin:c63441a32c35a155999aa9d518a7480f@postgres:5432/bsopt
# For simplicity, I'll use the direct URL here, but env var loading is preferred
# via pydantic-settings in the application itself.
# DATABASE_URL=postgresql+psycopg2://admin:c63441a32c35a155999aa9d518a7480f@postgres:5432/bsopt
# The connection string will be dynamically loaded from environment in production
# but for alembic to work, it needs a concrete connection string.
# Let's use the one derived from .env for now.
sqlalchemy.url = postgresql+psycopg2://admin:c63441a32c35a155999aa9d518a7480f@postgres:5432/bsopt

# logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname = root

[logger_sqlalchemy]
level = WARNING
handlers = console
qualname = sqlalchemy

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
formatter = generic
args = (sys.stderr,)

[formatter_generic]
format = %(levelname)s %(message)s
datefmt = %
