version: '3.9'

x-logging: &logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

x-deploy-gpu: &gpu-deploy
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

x-images:
  api: &img-api
    image: ghcr.io/${GITHUB_REPOSITORY:-yourusername/bsopt}-api:latest
    pull_policy: always
  ml: &img-ml
    image: ghcr.io/${GITHUB_REPOSITORY:-yourusername/bsopt}-ml:latest
    pull_policy: always
  gateway: &img-gateway
    image: ghcr.io/${GITHUB_REPOSITORY:-yourusername/bsopt}-gateway:latest
    pull_policy: always
  ray: &img-ray
    image: ghcr.io/${GITHUB_REPOSITORY:-yourusername/bsopt}-ray:latest
    pull_policy: always
  postgres: &img-postgres
    image: ghcr.io/${GITHUB_REPOSITORY:-yourusername/bsopt}-postgres:latest
    pull_policy: always

services:
  # ============================================================================
  # 🧠 RAY CLUSTER (RL Training) - OPTIMIZED
  # ============================================================================
  ray-head:
    <<: *img-ray
    container_name: bsopt-ray-head
    shm_size: '8gb' 
    environment:
      - RAY_USAGE_STATS_ENABLED=0
    ports:
      - "8265:8265"
      - "6379:6379"
      - "10001:10001"
    volumes:
      - ray_checkpoints:/root/ray_results
    networks:
      - app-net
    logging: *logging

  # ... (Similar refactoring for other production services) ...

networks:
  app-net:
  kafka-net:
  blockchain-net:

volumes:
  ray_checkpoints:
  kafka1_data:
  geth_data:
  rl_models: