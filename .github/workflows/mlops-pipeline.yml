name: BS-Opt MLOps Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '0 0 * * *' # Daily CT run

jobs:
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  linting:
    name: Code Quality (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff check
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_DB: bsopt_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-api.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5432/bsopt_test
          REDIS_URL: redis://localhost:6379/0
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
          PYTHONPATH: .
        run: |
          pytest --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

  continuous-training:
    name: Continuous Training (CT)
    # This would ideally run on a self-hosted GPU runner
    # runs-on: [self-hosted, gpu]
    runs-on: ubuntu-latest # Fallback to standard runner for now
    needs: [security-scan, linting]
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[run-ct]')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install ML dependencies
        run: |
          pip install -r requirements-ml.txt || echo "requirements-ml.txt not found, installing base"
          pip install xgboost torch optuna mlflow prometheus-client structlog pandas numpy scikit-learn

      - name: Verify GPU Availability
        id: gpu-check
        run: |
          python -c "import torch; print(f'GPU available: {torch.cuda.is_available()}')"
          if python -c "import torch; exit(0 if torch.cuda.is_available() else 1)"; then
            echo "gpu_active=true" >> $GITHUB_OUTPUT
          else
            echo "gpu_active=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Model Training (GPU)
        if: steps.gpu-check.outputs.gpu_active == 'true'
        run: |
          python src/ml/trainer.py --framework pytorch --use-gpu

      - name: Run Model Training (Mocked/CPU Fallback)
        if: steps.gpu-check.outputs.gpu_active == 'false'
        run: |
          echo "WARNING: GPU not available. Running mocked training on CPU."
          python src/ml/trainer.py --framework sklearn --n-estimators 10

  deploy:
    name: Deployment (GitOps)
    runs-on: ubuntu-latest
    needs: [security-scan, linting, integration-tests]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          load: true
          tags: bsopt-api:latest

      - name: Scan API Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'bsopt-api:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build ML Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ml
          push: false
          load: true
          tags: bsopt-ml:latest

      - name: Scan ML Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'bsopt-ml:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Finalize Deployment
        run: |
          echo "Successfully built, scanned, and verified images for GitOps deployment."
          echo "Release Tag: release-${{ github.run_id }}"
