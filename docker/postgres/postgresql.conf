# =============================================================================
# PostgreSQL Configuration for BSOPT Platform
# Optimized for 1000+ concurrent users with TimescaleDB
# =============================================================================

# =============================================================================
# CONNECTION SETTINGS
# =============================================================================
listen_addresses = '*'
port = 5432
max_connections = 200                    # Supports 150 app connections + admin

# =============================================================================
# MEMORY CONFIGURATION (For 4GB Container)
# =============================================================================
# Shared buffers: ~25% of RAM
shared_buffers = 1GB

# Effective cache size: ~75% of RAM (OS cache + shared_buffers)
effective_cache_size = 3GB

# Work memory per operation (sorts, joins, aggregates)
# Total usage = work_mem * max_connections * operations_per_query
# Conservative: 32MB * 200 = 6.4GB potential, but rarely all concurrent
work_mem = 32MB

# Memory for maintenance operations (VACUUM, CREATE INDEX, etc.)
maintenance_work_mem = 512MB

# Hash aggregation memory limit
hash_mem_multiplier = 2.0

# =============================================================================
# WRITE-AHEAD LOG (WAL)
# =============================================================================
wal_level = replica                      # Supports replication if needed
wal_buffers = 64MB                       # ~3% of shared_buffers
max_wal_size = 4GB                       # Allow larger WAL before checkpoint
min_wal_size = 1GB
checkpoint_completion_target = 0.9       # Spread checkpoint I/O
checkpoint_timeout = 10min

# Synchronous commit - balance durability vs performance
synchronous_commit = on                  # Change to 'off' for async if acceptable

# =============================================================================
# QUERY PLANNER
# =============================================================================
# SSD-optimized settings
random_page_cost = 1.1                   # SSDs have near-sequential random access
effective_io_concurrency = 200           # Concurrent I/O operations for SSDs
seq_page_cost = 1.0

# Planner cost estimates
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# Enable JIT compilation for complex queries
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# =============================================================================
# PARALLEL QUERY
# =============================================================================
max_worker_processes = 8                 # Total background workers
max_parallel_workers_per_gather = 4      # Workers per parallel query
max_parallel_workers = 8                 # Workers for parallel operations
max_parallel_maintenance_workers = 4     # Workers for CREATE INDEX, VACUUM
parallel_leader_participation = on
min_parallel_table_scan_size = 8MB
min_parallel_index_scan_size = 512kB

# =============================================================================
# VACUUM & AUTOVACUUM (Aggressive for Time-Series)
# =============================================================================
autovacuum = on
autovacuum_max_workers = 4               # More workers for time-series tables
autovacuum_naptime = 30s                 # Check more frequently
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.05    # Vacuum at 5% dead rows (vs 20% default)
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_delay = 2ms       # Less delay = more aggressive
autovacuum_vacuum_cost_limit = 1000      # Higher limit for faster vacuum

# =============================================================================
# BACKGROUND WRITER
# =============================================================================
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
bgwriter_flush_after = 512kB

# =============================================================================
# STATISTICS & MONITORING
# =============================================================================
# Track query statistics
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# Statistics target (higher = better estimates, more planning time)
default_statistics_target = 200

# Preload extensions
shared_preload_libraries = 'pg_stat_statements,timescaledb'

# pg_stat_statements configuration
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on
pg_stat_statements.track_planning = on
pg_stat_statements.save = on

# =============================================================================
# LOGGING
# =============================================================================
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on

# What to log
log_min_duration_statement = 100         # Log queries > 100ms
log_checkpoints = on
log_connections = off                    # Too noisy with pooling
log_disconnections = off
log_lock_waits = on
log_temp_files = 10MB                    # Log temp files > 10MB
log_autovacuum_min_duration = 1000       # Log autovacuum > 1s

# Log line format
log_line_prefix = '%m [%p] %q%u@%d '
log_statement = 'none'                   # Don't log all statements

# =============================================================================
# DEADLOCK & LOCK MANAGEMENT
# =============================================================================
deadlock_timeout = 1s
max_locks_per_transaction = 128
lock_timeout = 30s                       # Match app statement_timeout

# =============================================================================
# TIMEOUTS
# =============================================================================
statement_timeout = 30000                # 30s default (can override per-session)
idle_in_transaction_session_timeout = 60000  # 60s

# =============================================================================
# TIMESCALEDB SETTINGS
# =============================================================================
# TimescaleDB will auto-tune these, but we set reasonable defaults
timescaledb.max_background_workers = 8
timescaledb.telemetry_level = off

# =============================================================================
# CLIENT CONNECTION DEFAULTS
# =============================================================================
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

# =============================================================================
# RESOURCE USAGE
# =============================================================================
# Huge pages (if OS supports)
huge_pages = try

# Temporary files
temp_file_limit = 10GB

# =============================================================================
# REPLICATION (Standby-Ready)
# =============================================================================
# Uncomment for primary with replicas
# max_replication_slots = 4
# max_wal_senders = 4
# hot_standby = on
