# ==============================================================================
# HAProxy Configuration for Black-Scholes Option Pricing Platform
# ==============================================================================
# Purpose: Load balancing and connection routing for PostgreSQL HA cluster
#
# Features:
# - Health-aware routing to primary and standby nodes
# - Connection pooling support via PgBouncer
# - Automatic failover detection via Patroni REST API
# - Read/write split architecture
# - SSL/TLS termination
# - Monitoring and statistics
#
# Listening Ports:
# - 5000: Primary (write) connections
# - 5001: Read-only replica pool
# - 5002: PgBouncer connection pool (recommended)
# - 7000: HAProxy statistics dashboard
# - 9101: Prometheus metrics exporter
#
# Version: HAProxy 2.8+
# ==============================================================================

global
    # ==============================================================================
    # Global Settings
    # ==============================================================================
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # ==============================================================================
    # Performance Tuning
    # ==============================================================================
    # Maximum connections (10,000 concurrent connections target)
    maxconn 15000

    # Number of threads (match CPU cores)
    nbthread 8

    # CPU affinity
    cpu-map auto:1/1-8 0-7

    # ==============================================================================
    # TLS/SSL Configuration
    # ==============================================================================
    # Default SSL options (for client connections)
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

    # Default SSL options (for server connections)
    ssl-default-server-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-server-options ssl-min-ver TLSv1.2 no-tls-tickets

    # ==============================================================================
    # Logging
    # ==============================================================================
    log-send-hostname
    log-tag haproxy

defaults
    # ==============================================================================
    # Default Settings for All Sections
    # ==============================================================================
    log global
    mode tcp
    option tcplog
    option dontlognull

    # Timeouts
    timeout connect 10s
    timeout client 1h       # Long timeout for idle connections
    timeout server 1h       # Long timeout for database queries
    timeout queue 30s
    timeout check 5s

    # Retries
    retries 3

    # Load balancing algorithm
    balance leastconn       # Send to server with fewest connections

    # Error handling
    option redispatch
    option tcp-check

# ==============================================================================
# Statistics Dashboard
# ==============================================================================
# Access: http://<haproxy-host>:7000/stats
# Username: admin (change in production)
# Password: ${HAPROXY_STATS_PASSWORD}
listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /stats
    stats realm HAProxy\ Statistics
    stats auth admin:${HAPROXY_STATS_PASSWORD}
    stats refresh 30s
    stats show-legends
    stats show-node
    stats admin if TRUE

# ==============================================================================
# Prometheus Metrics Exporter
# ==============================================================================
# Exposes HAProxy metrics for Prometheus scraping
frontend prometheus
    bind *:9101
    mode http
    http-request use-service prometheus-exporter if { path /metrics }
    no log

# ==============================================================================
# Primary (Write) Backend - Port 5000
# ==============================================================================
# Routes all write traffic to the current Patroni leader
# Health check via Patroni REST API
frontend pg_primary
    bind *:5000
    mode tcp
    option tcplog

    # Connection limits
    maxconn 10000

    # ACLs for connection filtering
    tcp-request connection reject if { src_conn_rate gt 100 }
    tcp-request connection track-sc0 src

    default_backend pg_primary_backend

backend pg_primary_backend
    mode tcp
    option tcplog
    option tcp-check

    # Balance algorithm (first available for primary)
    balance first

    # Health check via Patroni REST API
    # Patroni returns 200 if node is primary, 503 otherwise
    option httpchk GET /master
    http-check expect status 200

    # Server definitions
    # Replace with actual server IPs
    server pg-primary 10.0.1.10:5432 check port 8008 inter 2s rise 2 fall 3 maxconn 3000
    server pg-standby-1 10.0.1.11:5432 check port 8008 inter 2s rise 2 fall 3 maxconn 3000 backup
    server pg-standby-2 10.0.1.12:5432 check port 8008 inter 2s rise 2 fall 3 maxconn 3000 backup

# ==============================================================================
# Read Replicas Backend - Port 5001
# ==============================================================================
# Load balances read-only queries across all standby nodes
# Uses round-robin with least connections
frontend pg_replicas
    bind *:5001
    mode tcp
    option tcplog

    # Connection limits
    maxconn 10000

    default_backend pg_replicas_backend

backend pg_replicas_backend
    mode tcp
    option tcplog
    option tcp-check

    # Balance algorithm (round-robin with least connections)
    balance leastconn

    # Health check via Patroni REST API
    # Patroni returns 200 if node is a replica
    option httpchk GET /replica
    http-check expect status 200

    # Server definitions
    # Primary is excluded (not a replica)
    # Standbys handle read-only traffic
    server pg-standby-1 10.0.1.11:5432 check port 8008 inter 2s rise 2 fall 3 maxconn 5000 weight 100
    server pg-standby-2 10.0.1.12:5432 check port 8008 inter 2s rise 2 fall 3 maxconn 5000 weight 100

# ==============================================================================
# PgBouncer Connection Pooling - Port 5002 (RECOMMENDED)
# ==============================================================================
# Routes traffic to PgBouncer instances for connection pooling
# This is the recommended approach for high connection counts
frontend pg_pooled
    bind *:5002
    mode tcp
    option tcplog

    # Connection limits
    maxconn 15000

    default_backend pgbouncer_backend

backend pgbouncer_backend
    mode tcp
    option tcplog
    option tcp-check

    # Balance algorithm
    balance roundrobin

    # Health check (TCP connect)
    tcp-check connect
    tcp-check send PING\r\n
    tcp-check expect string PONG

    # PgBouncer instances (one per PostgreSQL node)
    server pgbouncer-primary 10.0.1.10:6432 check inter 2s rise 2 fall 3 maxconn 10000
    server pgbouncer-standby-1 10.0.1.11:6432 check inter 2s rise 2 fall 3 maxconn 10000
    server pgbouncer-standby-2 10.0.1.12:6432 check inter 2s rise 2 fall 3 maxconn 10000

# ==============================================================================
# Read/Write Split Backend - Port 5003 (Advanced)
# ==============================================================================
# Automatically routes queries based on SQL command type
# Requires PostgreSQL protocol parsing (HAProxy 2.4+)
# NOT RECOMMENDED: Use application-level split or PgBouncer instead
# Included for reference only

# frontend pg_smart_split
#     bind *:5003
#     mode tcp
#     option tcplog
#
#     # Parse PostgreSQL protocol to detect SELECT vs INSERT/UPDATE/DELETE
#     # This is complex and not recommended - use app-level routing instead
#
#     default_backend pg_primary_backend

# ==============================================================================
# Backup and Monitoring Endpoints
# ==============================================================================

# Patroni REST API Proxy (for monitoring tools)
frontend patroni_api
    bind *:8008
    mode http
    option httplog

    # ACL to allow only internal monitoring
    acl internal_network src 10.0.0.0/8
    http-request deny unless internal_network

    default_backend patroni_api_backend

backend patroni_api_backend
    mode http
    option httplog
    option httpchk GET /health
    http-check expect status 200

    balance roundrobin

    server pg-primary 10.0.1.10:8008 check inter 5s rise 2 fall 3
    server pg-standby-1 10.0.1.11:8008 check inter 5s rise 2 fall 3
    server pg-standby-2 10.0.1.12:8008 check inter 5s rise 2 fall 3

# ==============================================================================
# Advanced Configuration
# ==============================================================================

# Connection Rate Limiting (DDoS Protection)
frontend rate_limit_tracker
    bind *:5004
    mode tcp

    # Track connection rate per source IP
    stick-table type ip size 100k expire 30s store conn_rate(10s)
    tcp-request connection track-sc1 src
    tcp-request connection reject if { sc1_conn_rate gt 100 }

    default_backend pg_primary_backend

