# template this file with the actual values.

# ==============================================================================
# Production Deployment Checklist
# ==============================================================================
# [ ] Replace placeholder IPs (10.0.1.x) with actual server addresses
# [ ] Configure SSL/TLS certificates if using encrypted connections
# [ ] Set strong password for stats dashboard
# [ ] Configure firewall rules (allow only internal traffic to PostgreSQL)
# [ ] Set up keepalived for HAProxy high availability
# [ ] Configure monitoring (Prometheus scraping port 9101)
# [ ] Test failover scenarios (stop primary, verify traffic routing)
# [ ] Configure log forwarding to centralized logging system
# [ ] Set up alerts for backend down events
# [ ] Document connection strings for applications:
#     - Write: postgresql://user:pass@haproxy:5000/options_platform
#     - Read: postgresql://user:pass@haproxy:5001/options_platform
#     - Pooled: postgresql://user:pass@haproxy:5002/options_platform

# ==============================================================================
# Performance Tuning Notes
# ==============================================================================
# 1. Connection Limits:
#    - Adjust maxconn based on available memory (1MB per 1000 connections)
#    - Total connections = maxconn * (number of HAProxy instances)
#
# 2. Timeouts:
#    - Increase timeout client/server for long-running queries
#    - Decrease timeout connect for faster failover detection
#
# 3. Health Checks:
#    - Decrease inter (interval) for faster failover (minimum 1s)
#    - Increase rise/fall for stability (avoid flapping)
#
# 4. Load Balancing:
#    - leastconn: Best for variable query durations
#    - roundrobin: Best for uniform query load
#    - first: Best for primary/backup scenarios
#
# 5. Threading:
#    - Set nbthread = number of CPU cores
#    - Use cpu-map for NUMA optimization
# ==============================================================================

# ==============================================================================
# Monitoring Commands
# ==============================================================================
# View current stats:
#   echo "show stat" | socat stdio /run/haproxy/admin.sock
#
# View current sessions:
#   echo "show sess" | socat stdio /run/haproxy/admin.sock
#
# Disable a server:
#   echo "disable server pg_primary_backend/pg-standby-1" | socat stdio /run/haproxy/admin.sock
#
# Enable a server:
#   echo "enable server pg_primary_backend/pg-standby-1" | socat stdio /run/haproxy/admin.sock
#
# Show errors:
#   echo "show errors" | socat stdio /run/haproxy/admin.sock
# ==============================================================================
