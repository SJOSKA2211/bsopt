# .pre-commit-config.yaml
# Used by pre-commit to run hooks before committing changes.
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ['--maxkb=500'] # Limit large files
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/flake8
    rev: 6.0.0
    hooks:
      - id: flake8

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: isort (python)

  - repo: local
    hooks:
      - id: run-mlflow-tests
        name: Run MLflow Orchestrator Tests
        entry: bash -c 'source venv/bin/activate && ./venv/bin/python3 -m pytest tests/mlflow_orchestrator_test.py'
        language: system
        files: '\.(py|yaml|json)$' # Run tests on relevant file changes
        pass_filenames: false
        always_run: false # Only run if relevant files change.
