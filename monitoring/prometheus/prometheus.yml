global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'bsopt-api'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']
  
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']